<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Seguro | ZIP Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="flex flex-col min-h-screen bg-gray-50">
    
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
        <div class="flex flex-col lg:flex-row gap-12">
            <!-- Items -->
            <div class="flex-1 bg-white p-8 rounded-2xl shadow-sm border" id="checkout-items">
                <!-- Dynamic Content -->
            </div>
            
            <!-- Summary -->
            <div class="lg:w-96" id="checkout-summary">
                <div class="bg-white p-6 rounded-2xl shadow-sm border sticky top-24">
                    <h2 class="text-lg font-bold mb-6">Resumen del pedido</h2>
                    <div class="space-y-4 text-sm">
                        <div class="flex justify-between text-gray-500"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
                        <div class="flex justify-between text-gray-500"><span>Impuestos (21%)</span><span id="tax">$0.00</span></div>
                        <div class="border-t pt-4 flex justify-between text-base font-bold"><span>Total</span><span id="total">$0.00</span></div>
                    </div>
                    <button class="w-full mt-6 bg-black text-white py-4 rounded-lg font-medium hover:bg-gray-900" onclick="alert('Pedido completado'); clearCart(); window.location.href='index.html'">Completar pedido</button>
                </div>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="main.js"></script>
</body>
</html>
